<!DOCTYPE html>
<html>
    <head>
        <title>Fancify Shamcify</title>
        <script src="fancifymytext.js" defer></script>
    </head>

    <body>
        <h1>Fancify my Text</h1>

        <fieldset>
            <legend>Text</legend>
            <textarea id="userText" rows="4" cols="30" placeholder="Type your text here..."></textarea>
        </fieldset>

        <fieldset>
            <legend>Fancify</legend>
            <button id="biggerBtn" onclick="makeBigger()">Bigger!</button>
            
            <button id="mooBtn" onclick="applyMoofication()">Moo</button>
            
            <br><br>
            
            <input type="radio" id="fancy" name="styleOpts" onchange="toggleStyle()">
            <label for="fancy">FancyShmancy</label>
            
            <input type="radio" id="boring" name="styleOpts" onchange="toggleStyle()" checked>
            <label for="boring">BoringBetty</label>
        </fieldset>
        
    </body>
</html>
